spring.application.name=LaboratoryBackend

server.port=8080

# ===== ??????????????=====
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.url=jdbc:mysql://localhost:3306/laboratory?characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.password=${DB_PASSWORD:your_password_here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*Mapper.xml

# ===== ????????????????=====
image.base-url=http://localhost:8080/images/
image.upload-path=${IMAGE_UPLOAD_PATH:/path/to/images/}

fault.image.upload-path=${FAULT_IMAGE_UPLOAD_PATH:/path/to/faultImages/}
fault.image.base-url=http://localhost:8080/fault-images/

# ===== ?????? =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== ???????? =====
spring.datasource.hikari.maximumPoolSize=50
spring.datasource.hikari.minimumIdle=10
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000

# ===== Actuator ???? =====
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true